<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Charset must be first -->
    <meta charset="UTF-8" />

    <!-- Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme color (Chrome Mobile SEO) -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="msapplication-TileColor" content="#6366f1" />

    <!-- Primary SEO -->
    <title>TechnoVera – Leading IT Solutions | Web Development, Software & Digital Services</title>
    <meta
      name="description"
      content="TechnoVera Solutions delivers cutting-edge IT services including web development, custom software, mobile apps, CRM systems, and digital transformation. Trusted by 100+ businesses across India. Get a free consultation today!"
    />
    <meta
      name="keywords"
      content="IT solutions India, web development company, software development services, mobile app development, CRM solutions, digital transformation, custom software development, enterprise IT services, TechnoVera, Pune IT company, business technology solutions"
    />
    <meta name="author" content="TechnoVera Solutions" />
    <meta name="copyright" content="TechnoVera Solutions" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://www.technovera.com/" />

    <!-- Geo Tags -->
    <meta name="geo.region" content="IN-MH" />
    <meta name="geo.placename" content="Pune" />
    <meta name="geo.position" content="18.5204;73.8567" />
    <meta name="ICBM" content="18.5204, 73.8567" />

    <!-- Preload Logo (Performance + SEO) -->
    <link rel="preload" as="image" href="/logo1.jpg" />

    <!-- Favicon - Using logo1.jpg -->
    <link rel="icon" type="image/jpeg" href="/logo1.jpg" />
    <link rel="shortcut icon" type="image/jpeg" href="/logo1.jpg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/logo1.jpg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TechnoVera Solutions" />
    <meta
      property="og:title"
      content="TechnoVera – Leading IT Solutions & Web Development Company"
    />
    <meta
      property="og:description"
      content="Transform your business with TechnoVera's expert IT solutions. Web development, software engineering, mobile apps, and digital transformation services. 10+ years of excellence."
    />
    <meta property="og:url" content="https://www.technovera.com/" />
    <meta
      property="og:image"
      content="https://www.technovera.com/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TechnoVera Solutions - IT Services" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@technovera" />
    <meta name="twitter:creator" content="@technovera" />
    <meta name="twitter:title" content="TechnoVera – IT Solutions & Web Development" />
    <meta
      name="twitter:description"
      content="Professional IT services including web development, software solutions, mobile apps, and digital transformation. Trusted by 100+ businesses."
    />
    <meta
      name="twitter:image"
      content="https://www.technovera.com/og-image.jpg"
    />

    <!-- Enhanced Organization Schema with Logo -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TechnoVera Solutions",
        "alternateName": "TechnoVera",
        "url": "https://www.technovera.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.technovera.com/logo1.jpg",
          "width": 512,
          "height": 512
        },
        "image": "https://www.technovera.com/logo1.jpg",
        "description": "TechnoVera Solutions is a leading IT company providing web development, custom software, mobile applications, and digital transformation services to businesses across India.",
        "foundingDate": "2013",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Katraj",
          "addressLocality": "Pune",
          "addressRegion": "Maharashtra",
          "postalCode": "411021",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-8208385551",
          "contactType": "customer service",
          "email": "info@technovera.com",
          "areaServed": "IN",
          "availableLanguage": ["en", "hi"]
        },
        "sameAs": [
          "https://www.facebook.com/technovera",
          "https://www.linkedin.com/company/technovera",
          "https://www.instagram.com/technovera",
          "https://twitter.com/technovera"
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.9",
          "reviewCount": "127"
        }
      }
    </script>

    <!-- Website Schema with Sitelinks Search Box -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TechnoVera Solutions",
        "url": "https://www.technovera.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://www.technovera.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Breadcrumb Schema for Navigation -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",

            "name": "Home",

          },
          {
            "@type": "ListItem",
            "position": 2,

          },
          {

    <!-- Service Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Service",
